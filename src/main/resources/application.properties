spring.application.name=backend

# Active profile: 'dev' (default) or 'prod'
# To run in production: java -jar app.jar --spring.profiles.active=prod
spring.profiles.active=dev

# ─── Database ────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/belmarket?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

# ─── JPA / Hibernate ─────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ─── HikariPool (DB Connections) ───────────────────────────
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.leak-detection-threshold=0

# ─── JWT ─────────────────────────────────────────────────────
application.security.jwt.secret-key=${JWT_SECRET}
application.security.jwt.expiration=900000
application.security.jwt.refresh-token.expiration=2592000000

# Silenciar aviso redundante de Spring Security sobre configuración manual
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR

# ─── CORS ────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:4200

# ─── Admin inicial ───────────────────────────────────────────
app.admin.email=${ADMIN_EMAIL}
app.admin.password=${ADMIN_PASSWORD}

# ─── Uploads / Cloudinary ────────────────────────────────────
# app.upload-dir=uploads
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ─── Multipart ───────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB
app.upload.max-image-size=2MB
app.upload.max-pdf-size=5MB

# ─── Server ──────────────────────────────────────────────────
server.port=8080

# ─── Jackson / JSON ──────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false

# ─── Correo Electrónico (SMTP) ─────────────────────────────
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ─── MercadoPago (Pagos) ───────────────────────────────────
mercadopago.access.token=${MP_ACCESS_TOKEN}
# URL base pública para recibir notificaciones (Webhooks). 
# En desarrollo usa ngrok. No olvides cambiarlo a tu dominio real.
app.webhook.url=${WEBHOOK_URL:http://localhost:8080/api}

# ─── Google OAuth2 ──────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

# ─── Frontend Redirect ───────────────────────────────────────
application.frontend.url=http://localhost:4200

# ─── Actuator (Monitoreo) ──────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.info.env.enabled=true

# ─── Logging ───────────────────────────────────────────────
logging.file.name=logs/belmarket.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.level.com.productos.mari=INFO

# ─── Chatbot (Gemini via OpenAI library) ─────────────────────
application.chatbot.api-key=${GEMINI_API_KEY}
spring.ai.openai.api-key=${application.chatbot.api-key}
spring.ai.openai.base-url=https://generativelanguage.googleapis.com/v1beta/openai/
spring.ai.openai.chat.options.model=gemini-flash-latest
