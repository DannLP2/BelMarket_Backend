# ============================================================
#  PRODUCCIÓN — application-prod.properties
#  ⚠️  NO subir este archivo a Git / control de versiones
#  Completar los valores antes de desplegar
# ============================================================

# ─── Database ────────────────────────────────────────────────
# Reemplaza DB_HOST, DB_NAME, DB_USER y DB_PASSWORD con los valores reales
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?ssl-mode=REQUIRED&serverTimezone=UTC
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# ─── JPA / Hibernate ─────────────────────────────────────────
# En producción: validate (no toca la BD) o none
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ─── JWT ─────────────────────────────────────────────────────
# Genera una clave segura de al menos 256 bits y ponla en la variable JWT_SECRET
application.security.jwt.secret-key=${JWT_SECRET}
application.security.jwt.expiration=86400000
application.security.jwt.refresh-token.expiration=604800000

# ─── CORS ────────────────────────────────────────────────────
# Ejemplo: http://192.168.1.100 o https://tudominio.com
app.cors.allowed-origins=${FRONTEND_URL}

# ─── Admin inicial ───────────────────────────────────────────
# Cambia estas credenciales antes de arrancar por primera vez en producción
app.admin.email=${ADMIN_EMAIL}
app.admin.password=${ADMIN_PASSWORD}

# ─── Uploads / Cloudinary ────────────────────────────────────
# app.upload-dir=${UPLOAD_DIR}
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ─── Multipart ───────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB
app.upload.max-image-size=2MB
app.upload.max-pdf-size=5MB

# ─── Server ──────────────────────────────────────────────────
server.port=${PORT:8080}

# ─── Correo Electrónico (SMTP) ─────────────────────────────
spring.mail.host=${SMTP_HOST}
spring.mail.port=${SMTP_PORT}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ─── MercadoPago (Pagos) ───────────────────────────────────
mercadopago.access.token=${MP_ACCESS_TOKEN}
app.webhook.url=${WEBHOOK_URL}

# ─── Google OAuth2 ──────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

# ─── Frontend Redirect ───────────────────────────────────────
application.frontend.url=${FRONTEND_URL}

# ─── Chatbot (Gemini via OpenAI library) ─────────────────────
application.chatbot.api-key=${GEMINI_API_KEY}
spring.ai.openai.api-key=${application.chatbot.api-key}
spring.ai.openai.base-url=https://generativelanguage.googleapis.com/v1beta/openai/
spring.ai.openai.chat.options.model=gemini-flash-latest
