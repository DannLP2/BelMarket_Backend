# Configuración para Integration Tests (H2 en memoria)
spring.datasource.url=jdbc:h2:mem:belmarket_test;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT (valor fijo para tests)
application.security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
application.security.jwt.expiration=900000
application.security.jwt.refresh-token.expiration=2592000000

# Admin inicial (para tests de seguridad)
app.admin.email=admin@test.com
app.admin.password=Admin1234!

# Deshabilitar integraciones externas en tests
cloudinary.cloud-name=test
cloudinary.api-key=test
cloudinary.api-secret=test

spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test@belmarket.com
spring.mail.password=test-password

mercadopago.access.token=TEST-TOKEN
app.webhook.url=http://localhost:8080/api

spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret

# CORS para tests
app.cors.allowed-origins=http://localhost:4200

# File upload
app.upload.max-image-size=2MB
app.upload.max-pdf-size=5MB

# Silenciar logs durante tests
logging.level.root=WARN
logging.level.com.productos.mari=INFO
logging.level.org.hibernate.SQL=WARN

# Path matching strategy para tests
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
GEMINI_API_KEY=test-key
